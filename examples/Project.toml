# Separate environment for the RxGP example notebooks.
#
# First-time setup (run from the repository root):
#
#   using Pkg
#   Pkg.activate("examples")
#   Pkg.develop(PackageSpec(path="."))   # link local RxGP
#   Pkg.instantiate()
#
# Subsequent use:
#
#   using Pkg
#   Pkg.activate("examples")

